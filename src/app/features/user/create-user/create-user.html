<div class="page-container">
  <h2 class="page-title">Tạo User</h2>

  <form nz-form nzLayout="vertical" [formGroup]="form">
    <div nz-row [nzGutter]="16">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired>Username</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="username" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired>Password</nz-form-label>
          <nz-form-control>
            <input nz-input type="password" formControlName="password" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label>Họ tên</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="name" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label>Email</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="email" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label>Phòng ban</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="sections">
              <nz-option *ngFor="let d of sections" [nzValue]="d.id" [nzLabel]="d.name"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label>Chức vụ</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="positionId">
              <nz-option
                *ngFor="let p of positions"
                [nzValue]="p.id"
                [nzLabel]="p.name"
              ></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="24">
        <nz-form-item>
          <nz-form-label>Quyền</nz-form-label>
          <nz-form-control>
            <nz-select nzMode="multiple" formControlName="roleIds">
              <nz-option *ngFor="let r of roles" [nzValue]="r.id" [nzLabel]="r.name"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div class="form-action">
      <button nz-button nzType="default" (click)="back()">Quay lại</button>
      <!-- <button nz-button nzType="primary" (click)="submit()">Tạo User</button> -->
      <button-primary label="Tạo User" (onClick)="submit()"></button-primary>
    </div>
  </form>
  <div class="global-loading" *ngIf="isLoading$ | async">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="text">Đang xử lý...</div>
  </div>
</div>
</div>
