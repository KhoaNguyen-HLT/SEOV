<div class="header-actions">
  <button nz-button nzType="primary" (click)="showCreateModal()">
    <span nz-icon nzType="plus"></span> Thêm Vai Trò Mới
  </button>
</div>

<nz-table #basicTable [nzData]="permissions">
  <thead>
    <tr>
      <th>ID</th>
      <th>Tên quyền (Permission)</th>
      <th>Mã quyền (Code)</th>
      <th>Hành động</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let data of permissions">
      <td>{{ data.id }}</td>
      <td>{{ data.name }}</td>
      <td>{{ data.code }}</td>
      <td>
        <nz-space>
          <button *nzSpaceItem nz-button nzType="default" (click)="showEditModal(data)">Sửa</button>
          <button *nzSpaceItem nz-button nzType="primary" nzDanger nz-popconfirm
            nzPopconfirmTitle="Bạn có chắc chắn muốn xóa permission này không?" (nzOnConfirm)="deleteRole(data.id)">
            Xóa
          </button>
        </nz-space>
      </td>
    </tr>
  </tbody>
</nz-table>

<nz-modal [(nzVisible)]="isModalVisible" [nzTitle]="editingId ? 'Cập nhật Permission' : 'Thêm Permission Mới'"
  (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()">

  <ng-container *nzModalContent>
    <form nz-form [formGroup]="validateForm">
      <nz-form-item>
        <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="name">Tên Permission</nz-form-label>
        <nz-form-control [nzSm]="14" [nzXs]="24" nzErrorTip="Vui lòng nhập tên permission!">
          <input nz-input formControlName="name" id="name" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="code">Mã quyền (Code)</nz-form-label>
        <nz-form-control [nzSm]="14" [nzXs]="24" nzErrorTip="Vui lòng nhập mã quyền">
          <input nz-input formControlName="code" id="code" />
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
